<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro de Pagamento</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 15px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    border: 2px solid #ef4444;
    text-align: center;
}

h1 {
    color: #ef4444;
    font-size: clamp(20px, 5vw, 28px);
    margin-bottom: 10px;
}

p {
    font-size: clamp(14px, 4vw, 18px);
    margin-bottom: 10px;
}

.highlight {
    color: #ef4444;
    font-weight: bold;
}

.countdown {
    font-size: clamp(20px, 6vw, 26px);
    font-weight: bold;
    color: #ef4444;
    margin: 20px 0;
}

.btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: #ef4444;
    color: #fff;
    text-decoration: none;
    font-size: clamp(16px, 4.5vw, 18px);
    border-radius: 10px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
    <h1>⚠️ Erro de pagamento</h1>
    <p>Não foi possível concluir o seu saque.</p>
    <p class="highlight">Tente novamente e receba o seu saque agora.</p>

    <div class="countdown" id="timer">02:00</div>

    <a href="https://pay.clickpayon.com/35381fc5-28aa-4d86-8698-9c5fd26dc601" class="btn">
        Tentar novamente
    </a>
</div>

<script>
// CONTADOR
let time = 120;
const timer = document.getElementById('timer');

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    timer.innerHTML = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    if (time > 0) time--;
}, 1000);
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificações de Compras</title>

<script src="https://cdn.jsdelivr.net/npm/notiflix@2.6.0/dist/notiflix-aio-2.6.0.min.js"></script>

<script>
    var position = "left-bottom";
    var color = "verde";
    var animation = "from-left";
    var product_name = "";
    var timeout = 4000;
    var type_name = "fem";
    var msg_final = "";

    var names_fem = [
        'João', 'Manuel', 'Paulo', 'Carlos', 'Pedro', 'José', 'António',
        'Filipe', 'Domingos', 'Miguel', 'Mateus', 'Daniel', 'Jorge',
        'Adilson', 'Edson', 'Emanuel', 'Geraldo', 'Luís', 'Fernando',
        'Kazumbula', 'Osvaldo', 'Valter', 'Maurício', 'Tomás', 'César',
        'Ana', 'Antónia', 'Adriana', 'Juliana', 'Márcia', 'Fernanda',
        'Patrícia', 'Camila', 'Bruna', 'Jéssica', 'Luciana', 'Mariana',
        'Vitória', 'Cláudia'
    ];

    var option = {
        position: position,
        cssAnimationStyle: animation,
        plainText: false,
        timeout: timeout
    };

    function gerarValor() {
        // Gera valor entre 100000 e 160000
        return Math.floor(Math.random() * (160000 - 100000 + 1)) + 100000;
    }

    function formatarKz(valor) {
        return valor.toLocaleString('pt-PT') + " kz";
    }

    function show_notification() {
        var nome = names_fem[Math.floor(Math.random() * names_fem.length)];
        var valor = formatarKz(gerarValor());

        msg_final = "<strong>" + nome + "</strong> sacou agora " + valor + " " + product_name;

        if (color == "verde") {
            Notiflix.Notify.Success(msg_final, option);
        }

        if (color == "azul") {
            Notiflix.Notify.Info(msg_final, option);
        }

        if (color == "vermelho") {
            Notiflix.Notify.Failure(msg_final, option);
        }

        if (color == "amarelo") {
            Notiflix.Notify.Warning(msg_final, option);
        }

        setTimeout(show_notification, 10000);
    }

    // Primeira notificação imediata
    setTimeout(show_notification, 1000);
</script>

</body>
</html>
