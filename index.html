<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro de Pagamento</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 15px;
}

/* CONTAINER RESPONSIVO */
.container {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    border: 2px solid #ef4444;
    text-align: center;
}

/* TIPOGRAFIA RESPONSIVA */
h1 {
    color: #ef4444;
    font-size: clamp(20px, 5vw, 28px);
    margin-bottom: 10px;
}

p {
    font-size: clamp(14px, 4vw, 18px);
    margin-bottom: 10px;
}

.highlight {
    color: #ef4444;
    font-weight: bold;
}

/* CONTADOR */
.countdown {
    font-size: clamp(20px, 6vw, 26px);
    font-weight: bold;
    color: #ef4444;
    margin: 20px 0;
}

/* BOTÃO FULL WIDTH MOBILE */
.btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: #ef4444;
    color: #fff;
    text-decoration: none;
    font-size: clamp(16px, 4.5vw, 18px);
    border-radius: 10px;
    animation: pulse 1s infinite;
}

/* ANIMAÇÃO */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* NOTIFICAÇÃO */
.notify {
    position: fixed;
    bottom: 15px;
    left: 15px;
    right: 15px;
    max-width: 350px;
    margin: auto;
    background: #000;
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    text-align: center;
}

/* DESKTOP AJUSTE */
@media (min-width: 768px) {
    .notify {
        left: 20px;
        right: auto;
        margin: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>⚠️ Erro de pagamento</h1>
    <p>Não foi possível concluir o seu saque.</p>
    <p class="highlight">Tente novamente e receba o seu saque agora.</p>

    <div class="countdown" id="timer">02:00</div>

    <a href="https://pay.clickpayon.com/35381fc5-28aa-4d86-8698-9c5fd26dc601" class="btn">
        Tentar novamente
    </a>
</div>

<div class="notify" id="notify"></div>

<script>
// CONTADOR OTIMIZADO
let time = 120;
const timer = document.getElementById('timer');

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    timer.innerHTML = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    if (time > 0) time--;
}, 1000);

// NOTIFICAÇÃO RESPONSIVA
const nomes = ["Carlos", "João", "Mateus", "Ana", "Bruno", "Paulo", "Fernanda"];
const notify = document.getElementById('notify');

function showNotify() {
    let nome = nomes[Math.floor(Math.random() * nomes.length)];
    let valor = (Math.random() * 50000 + 5000).toFixed(0);

    notify.innerHTML = `💸 ${nome} acabou de sacar ${valor} Kz`;
    notify.style.display = 'block';

    setTimeout(() => {
        notify.style.display = 'none';
    }, 3000);
}

setInterval(showNotify, 5000);
</script>

</body>
</html>
