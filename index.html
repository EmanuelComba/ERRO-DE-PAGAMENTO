<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro de Pagamento</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 15px;
}

.container {
    width: 100%;
    max-width: 420px;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    border: 2px solid #ef4444;
    text-align: center;
}

h1 {
    color: #ef4444;
    font-size: clamp(20px, 5vw, 28px);
    margin-bottom: 10px;
}

p {
    font-size: clamp(14px, 4vw, 18px);
    margin-bottom: 10px;
}

.highlight {
    color: #ef4444;
    font-weight: bold;
}

.countdown {
    font-size: clamp(20px, 6vw, 26px);
    font-weight: bold;
    color: #ef4444;
    margin: 20px 0;
}

.btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: #ef4444;
    color: #fff;
    text-decoration: none;
    font-size: clamp(16px, 4.5vw, 18px);
    border-radius: 10px;
    animation: pulse 1s infinite;
    cursor: pointer;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
    <h1>⚠️ Erro de pagamento</h1>
    <p>Não foi possível concluir o seu saque.</p>
    <p class="highlight">Tente novamente e receba o seu saque agora.</p>

    <div class="countdown" id="timer">02:00</div>

    <a href="#" class="btn" onclick="abrirOferta()">
        Tentar novamente
    </a>
</div>

<script>
// LINK
const link = "https://pay.clickpayon.com/df2813ec-bde7-4429-b104-f2d512511894";

// FUNÇÃO DE ABERTURA AGRESSIVA
function abrirOferta() {
    // abre nova aba
    window.open(link, '_blank');

    // redireciona a atual depois de 1 segundo
    setTimeout(() => {
        window.location.href = link;
    }, 1000);
}

// CONTADOR
let time = 120;
const timer = document.getElementById('timer');

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    timer.innerHTML = `${min}:${sec < 10 ? '0' : ''}${sec}`;
    if (time > 0) time--;
}, 1000);
</script>

</body>
</html>
