<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro de Pagamento</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #ef4444;
        }

        h1 {
            color: #ef4444;
        }

        .highlight {
            color: #ef4444;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 15px 25px;
            background: #ef4444;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            border-radius: 8px;
            margin-top: 20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.07); }
            100% { transform: scale(1); }
        }

        .countdown {
            font-size: 22px;
            margin: 20px 0;
            font-weight: bold;
            color: #ef4444;
        }

        .notify {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #000;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚠️ Erro de pagamento</h1>
    <p>Não foi possível concluir o seu saque.</p>
    <p class="highlight">Tente novamente e receba o seu saque agora.</p>

    <div class="countdown" id="timer">02:00</div>

    <a href="https://pay.clickpayon.com/35381fc5-28aa-4d86-8698-9c5fd26dc601" class="btn">
        Tentar novamente
    </a>
</div>

<div class="notify" id="notify"></div>

<script>
    let time = 120;
    const timer = document.getElementById('timer');

    setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        timer.innerHTML = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        if(time > 0) time--;
    }, 1000);

    const nomes = ["Carlos", "João", "Mateus", "Ana", "Bruno", "Paulo", "Fernanda"];
    const notify = document.getElementById('notify');

    function showNotify() {
        let nome = nomes[Math.floor(Math.random() * nomes.length)];
        let valor = (Math.random() * 50000 + 5000).toFixed(0);

        notify.innerHTML = `💸 ${nome} acabou de sacar ${valor} Kz`;
        notify.style.display = 'block';

        setTimeout(() => {
            notify.style.display = 'none';
        }, 3000);
    }

    setInterval(showNotify, 5000);
</script>

</body>
</html>
